<!DOCTYPE html>
<html>
<head>
<title>IPL Auction Dashboard</title>

<style>
body{
font-family: Arial;
background:#f4f4f4;
}

table{
width:100%;
border-collapse:collapse;
background:white;
}

th,td{
padding:12px;
border:1px solid #ddd;
text-align:center;
}

th{
background:#333;
color:white;
}

input{
padding:5px;
}
</style>

</head>

<body>

<h1>IPL Auction Dashboard</h1>

<table>

<tr>
<th>Player</th>
<th>Team</th>
<th>Current Bid</th>
<th>Company</th>
<th>Bid</th>
</tr>

{% for player in players %}

<tr>

<td>{{player.name}}</td>
<td>{{player.team}}</td>
<td>{{player.current_bid}}</td>
<td>{{player.company}}</td>

<td>

<form action="/bid/{{player.id}}" method="post">

<input type="text" name="company" placeholder="Company" required>

<input type="number" name="bid" placeholder="Bid Price" required>

<button type="submit">Bid</button>

</form>

</td>

</tr>

{% endfor %}

</table>

</body>
</html>
