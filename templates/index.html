<!DOCTYPE html>
<html>
<head>
<title>IPL Auction</title>
<style>
body {font-family: Arial; text-align:center;}
table {margin:auto; border-collapse: collapse;}
td,th {border:1px solid black; padding:10px;}
</style>
</head>

<body>

<h1>IPL Auction</h1>

<table>
<tr>
<th>Player</th>
<th>Company</th>
<th>Price</th>
</tr>

{% for p in players %}
<tr>
<td>{{p[0]}}</td>
<td>{{p[1]}}</td>
<td>{{p[2]}}</td>
</tr>
{% endfor %}
</table>

<h2>Place Bid</h2>

<form action="/bid" method="post">
Player: <input name="player"><br><br>
Company: <input name="company"><br><br>
Price: <input name="price"><br><br>
<button type="submit">Submit Bid</button>
</form>

</body>
</html>
