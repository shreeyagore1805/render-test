<!DOCTYPE html>
<html>
<head>
<title>IPL Auction</title>
<style>

body{
font-family: Arial;
background:#f4f4f4;
}

table{
border-collapse: collapse;
width:100%;
background:white;
}

th,td{
padding:10px;
border:1px solid #ddd;
text-align:center;
}

th{
background:#333;
color:white;
}

form{
display:flex;
gap:5px;
}

input{
padding:5px;
}

button{
background:green;
color:white;
border:none;
padding:5px 10px;
}

</style>
</head>

<body>

<h1>IPL Auction Dashboard</h1>

<table>

<tr>
<th>Player</th>
<th>Team</th>
<th>Current Bid</th>
<th>Company</th>
<th>Bid</th>
</tr>

{% for p in players %}

<tr>

<td>{{p.name}}</td>
<td>{{p.team}}</td>
<td>{{p.current_bid}}</td>
<td>{{p.company}}</td>

<td>

<form action="/bid" method="POST">

<input type="hidden" name="player_id" value="{{p.id}}">

<input type="text" name="company" placeholder="Company" required>

<input type="number" name="price" placeholder="Bid Price" required>

<button type="submit">Bid</button>

</form>

</td>

</tr>

{% endfor %}

</table>

</body>
</html>
